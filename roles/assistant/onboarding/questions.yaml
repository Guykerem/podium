# Personal Assistant — Onboarding Questions
# Normalized for setup v0.2 (M5). Kept short (3-6 questions): longer intake
# moves to first-conversation prompts so setup stays under 15 minutes.
#
# Schema: id | prompt | type (text|choice|multi) | options? | required | memory_key
# `memory_key` is where the answer lands in roles/assistant/memory/context.md
# YAML frontmatter; nested dotted keys are allowed ("profile.name").

questions:
  - id: name
    prompt: "What should I call you?"
    type: text
    required: true
    memory_key: name

  - id: pronouns
    prompt: "Preferred pronouns?"
    type: choice
    options:
      - "he/him"
      - "she/her"
      - "they/them"
      - "prefer not to say"
    required: false
    memory_key: pronouns

  - id: primary_goal
    prompt: >
      In one sentence — what should I help you with most right now?
    type: text
    required: true
    memory_key: primary_goal

  - id: peak_hours
    prompt: "When is your brain sharpest?"
    type: choice
    options:
      - "early morning (before 9am)"
      - "mid-morning (9am–12pm)"
      - "afternoon (1pm–5pm)"
      - "evening (after 6pm)"
      - "varies"
    required: false
    memory_key: peak_hours

  - id: interrupt_tolerance
    prompt: >
      How proactive should I be with mid-day check-ins?
    type: choice
    options:
      - "quiet (brief + weekly review is enough)"
      - "balanced (only when something needs attention)"
      - "active (nudge me often)"
    required: false
    memory_key: interrupt_tolerance
