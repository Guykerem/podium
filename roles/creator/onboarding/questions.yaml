# Content Creator — Onboarding Questions
# Normalized for setup v0.2 (M5). Deeper tool/platform inventory moves to
# first-session dialogue so setup stays under 15 minutes.
#
# Schema: id | prompt | type (text|choice|multi) | options? | required | memory_key

questions:
  - id: name
    prompt: "What should I call you?"
    type: text
    required: true
    memory_key: name

  - id: primary_goal
    prompt: >
      In one sentence — what should I help you create more of, or create
      better? (e.g. "ship a weekly YouTube essay", "repurpose podcasts into
      LinkedIn posts".)
    type: text
    required: true
    memory_key: primary_goal

  - id: creator_stage
    prompt: "Where are you in your creator journey?"
    type: choice
    options:
      - "starting — want to but haven't shipped consistently"
      - "building — post regularly on 1-2 platforms, want to level up"
      - "scaling — have a body of work, need to produce more, faster"
      - "pro — creating is my job"
    required: true
    memory_key: creator_stage

  - id: primary_formats
    prompt: "Which formats do you create (or want to create)?"
    type: multi
    options:
      - "short video (TikTok, Reels, Shorts)"
      - "long video (YouTube, interviews, tutorials)"
      - "podcast (audio, video podcast, clips)"
      - "written (LinkedIn, X, newsletter, blog)"
      - "visual (images, carousels, infographics)"
    required: false
    memory_key: primary_formats

  - id: biggest_bottleneck
    prompt: "What slows you down the most right now?"
    type: choice
    options:
      - "ideas — finding what to make"
      - "capturing — getting the raw material recorded"
      - "editing — production work"
      - "writing — hooks, scripts, captions"
      - "repurposing — getting enough out of each capture"
      - "consistency — showing up reliably"
    required: false
    memory_key: biggest_bottleneck
