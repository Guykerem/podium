# Private Tutor — Onboarding Questions
# Normalized for setup v0.2 (M5). Target: 3-6 questions. Deeper calibration
# (learning format, session shape, feedback style) moves to first-lesson
# dialogue so setup stays tight.
#
# Schema: id | prompt | type (text|choice|multi) | options? | required | memory_key

questions:
  - id: name
    prompt: "What should I call you?"
    type: text
    required: true
    memory_key: name

  - id: primary_goal
    prompt: >
      What do you want to learn, and why? One sentence is plenty —
      e.g. "pass the GRE by June" or "finally understand transformers."
    type: text
    required: true
    memory_key: primary_goal

  - id: starting_level
    prompt: "How would you describe your current level in this domain?"
    type: choice
    options:
      - "absolute beginner — new to it"
      - "exposed — read or heard about it"
      - "working — can use some of it, with gaps"
      - "intermediate — here to sharpen and fill gaps"
      - "advanced — want depth and frontiers"
    required: true
    memory_key: starting_level

  - id: challenge_tolerance
    prompt: >
      How much productive struggle do you want?
    type: choice
    options:
      - "gentle — ease me in, build confidence first"
      - "balanced — mix of wins and stretches"
      - "spicy — push me, I'd rather fail and learn"
    required: false
    memory_key: challenge_tolerance

  - id: session_shape
    prompt: "When and how long can you focus?"
    type: choice
    options:
      - "micro (5-10 min bursts)"
      - "short (15-25 min once or twice a day)"
      - "pomodoro (25-50 min focused blocks)"
      - "long (60-90 min deep sessions)"
    required: false
    memory_key: session_shape
