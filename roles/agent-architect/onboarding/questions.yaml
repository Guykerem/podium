# Agent Architect — Onboarding Questions
# Normalized for setup v0.2 (M5).
#
# Schema: id | prompt | type (text|choice|multi) | options? | required | memory_key

questions:
  - id: name
    prompt: "What should I call you?"
    type: text
    required: true
    memory_key: name

  - id: primary_goal
    prompt: >
      What do you want to walk away with? In one sentence, what would make
      this time well spent?
    type: text
    required: true
    memory_key: primary_goal

  - id: experience_level
    prompt: "How much experience do you have with AI tools?"
    type: choice
    options:
      - "beginner — barely used AI tools, or never"
      - "some — used ChatGPT or similar, nothing technical"
      - "technical — built things with AI, written prompts, used APIs"
    required: true
    memory_key: experience_level

  - id: curiosity
    prompt: >
      What are you most curious about when it comes to AI agents?
    type: text
    required: false
    memory_key: curiosity
