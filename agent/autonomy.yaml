# Agent — Autonomy Configuration
#
# Controls how much the agent decides without asking.
# Start at level 1. Earn your way up.
#
# Level 1: Ask before every action (training wheels)
#   - The agent explains what it wants to do and waits for approval
#   - Best for: first-time users, unfamiliar tasks, high-stakes work
#
# Level 2: Act on routine, ask on judgment calls (assisted)
#   - The agent handles straightforward tasks independently
#   - Asks permission for ambiguous decisions or new territory
#   - Best for: familiar tasks, moderate stakes, building trust
#
# Level 3: Act autonomously, surface only blockers (conductor mode)
#   - The agent runs the full loop on its own
#   - Only interrupts when genuinely stuck or needs a decision
#   - Best for: well-tested workflows, low stakes, trusted domains

level: 1

# Per-skill overrides
# Uncomment and adjust to give specific skills more or less autonomy.
# overrides:
#   communicate: 2
#   remember: 2
#   observe: 1
#   schedule: 1
#   act: 1

# Escalation rules
escalation:
  # Always ask the user before doing these, regardless of autonomy level
  always_ask:
    - sending external messages
    - spending money
    - deleting data
    - modifying config

  # Never block on these — always allowed without asking
  never_block:
    - reading memory
    - knowledge lookups
    - formatting responses
