# Tools required by the Research skill

tools:
  - name: knowledge_search
    description: Search the agent's built-in knowledge base
    required: true

  - name: web_search
    description: Search the web for sources beyond the knowledge base
    required: false  # Only at autonomy level 2+

  - name: read_document
    description: Read and extract content from a URL or file
    required: true

  - name: write_output
    description: Produce the structured summary
    required: true
